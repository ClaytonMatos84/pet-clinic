spring.application.name=pet-clinic

# H2 for tests only
spring.datasource.url=jdbc:h2:mem:petclinic-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=true

# Keep test bootstrap on H2 scripts for compatibility with SQLite-specific migrations
spring.flyway.enabled=false
spring.sql.init.schema-locations=classpath:db/h2/schema.sql
spring.sql.init.data-locations=classpath:db/h2/data.sql
spring.sql.init.mode=always
