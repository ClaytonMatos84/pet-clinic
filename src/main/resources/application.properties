spring.application.name=pet-clinic

# SQLite Database
spring.datasource.url=jdbc:sqlite:data/petclinic.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.open-in-view=true

# SQL initialization disabled in favor of Flyway migrations
spring.sql.init.mode=never

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# Server
server.port=8080
